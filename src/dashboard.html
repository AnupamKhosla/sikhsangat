<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SikhSangat Replicator Console</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --mac-bg: #f5f5f7; --terminal-bg: #1e1e1e; }
        body { background: var(--mac-bg); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { background: #fff; border-bottom: 1px solid #ddd; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .main-content { flex: 1; display: flex; overflow: hidden; padding: 20px; gap: 20px; }
        .terminal { flex: 1.5; background: var(--terminal-bg); border-radius: 12px; color: #fff; padding: 20px; font-family: 'SF Mono', monospace; font-size: 13px; overflow-y: auto; display: flex; flex-direction: column-reverse; box-shadow: inset 0 0 10px #000; }
        .qa-panel { flex: 1; background: #fff; border-radius: 12px; border: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
        .qa-list { flex: 1; overflow-y: auto; padding: 15px; }
        .log-line { border-bottom: 1px solid #333; padding: 5px 0; white-space: pre-wrap; }
        .qa-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 11px; }
        .badge-stat { background: #000; color: #fff; padding: 5px 12px; border-radius: 20px; font-weight: bold; margin-left: 10px; }
        .pagination-container { background: #f8f9fa; border-top: 1px solid #ddd; padding: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="fw-bold fs-5">SIKHSANGAT ARCHIVE v4.0</div>
        <div class="d-flex">
            <div class="badge-stat">SAVED: <span id="count" class="text-success">__COUNT__</span></div>
            <div class="badge-stat">JITTER: <span id="jitter">__JITTER__</span>ms</div>
            <div class="badge-stat">THREADS: <span id="parallel">__THREADS__</span></div>
        </div>
    </div>
    <div class="main-content">
        <div id="logs" class="terminal"></div>
        <div class="qa-panel">
            <div class="p-3 bg-light border-bottom fw-bold text-muted small">MIRROR QA LIST (Paginated)</div>
            <div id="qa-list" class="qa-list"></div>
            <div class="pagination-container d-flex justify-content-between align-items-center">
                <button id="prev" class="btn btn-sm btn-outline-primary">Prev</button>
                <span id="page-info" class="small text-muted">Page 1</span>
                <button id="next" class="btn btn-sm btn-outline-primary">Next</button>
            </div>
        </div>
    </div>
    <script>
        const socket = io();
        const logDiv = document.getElementById('logs');
        const qaList = document.getElementById('qa-list');
        let currentPage = 1;

        function addLog(msg) {
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span style="color:#888;margin-right:10px">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            logDiv.prepend(line);
            if (logDiv.childNodes.length > 50) logDiv.removeChild(logDiv.lastChild);
        }

        function renderQaItem(path) {
            const item = document.createElement('div');
            item.className = 'qa-item';
            const realUrl = 'https://' + path.replace('/index.html', '');
            item.innerHTML = `
                <div class="text-truncate mb-1" title="${path}">${path}</div>
                <div class="btn-group btn-group-sm w-100">
                    <a href="/mirror/${path}" target="_blank" class="btn btn-outline-dark">View Mirror</a>
                    <a href="${realUrl}" target="_blank" class="btn btn-outline-secondary">Live Site</a>
                </div>
            `;
            return item;
        }

        async function loadPage(page) {
            try {
                const response = await fetch(`/qa/list?page=${page}`);
                const data = await response.json();
                qaList.innerHTML = '';
                data.files.forEach(f => qaList.appendChild(renderQaItem(f.path)));
                document.getElementById('page-info').innerText = `Page ${data.currentPage} of ${data.pages}`;
                currentPage = data.currentPage;
            } catch (e) { addLog("Error loading page: " + e.message); }
        }

        document.getElementById('prev').onclick = () => { if (currentPage > 1) loadPage(currentPage - 1); };
        document.getElementById('next').onclick = () => loadPage(currentPage + 1);

        socket.on('update', (data) => {
            if (data.config) {
                document.getElementById('count').innerText = data.config.downloadedCount;
                document.getElementById('jitter').innerText = data.config.currentJitter;
            }
            if (data.msg) {
                addLog(data.msg);
                if (data.msg.includes('[SAVED]') && currentPage === 1) loadPage(1);
            }
        });

        loadPage(1);
    </script>
</body>
</html>
