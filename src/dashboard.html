<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SikhSangat Replicator Console</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --mac-bg: #f5f5f7; --terminal-bg: #1e1e1e; }
        body { background: var(--mac-bg); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { background: #fff; border-bottom: 1px solid #ddd; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; }
        .main-content { flex: 1; display: flex; overflow: hidden; padding: 20px; gap: 20px; }
        .terminal { flex: 1.5; background: var(--terminal-bg); border-radius: 12px; color: #fff; padding: 20px; font-family: 'SF Mono', monospace; font-size: 13px; overflow-y: auto; display: flex; flex-direction: column-reverse; box-shadow: inset 0 0 10px #000; }
        .qa-panel { flex: 1; background: #fff; border-radius: 12px; border: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
        .qa-list { flex: 1; overflow-y: auto; padding: 15px; }
        .log-line { border-bottom: 1px solid #333; padding: 5px 0; white-space: pre-wrap; }
        .qa-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 12px; }
        .badge-stat { background: #000; color: #fff; padding: 5px 12px; border-radius: 20px; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="fw-bold fs-5">SIKHSANGAT ARCHIVE v4.0</div>
        <div class="d-flex">
            <div class="badge-stat">SAVED: <span id="count" class="text-success">__COUNT__</span></div>
            <div class="badge-stat">JITTER: <span id="jitter">__JITTER__</span>ms</div>
            <div class="badge-stat">THREADS: <span id="parallel">__THREADS__</span></div>
        </div>
    </div>
    <div class="main-content">
        <div id="logs" class="terminal"><!--LOG_HISTORY--></div>
        <div class="qa-panel">
            <div class="p-3 bg-light border-bottom fw-bold text-muted small">MIRROR QA LIST</div>
            <div id="qa-list" class="qa-list"><!--QA_LIST--></div>
        </div>
    </div>
    <script>
        const socket = io();
        const logDiv = document.getElementById('logs');
        const qaList = document.getElementById('qa-list');

        function addLog(msg) {
            const line = document.createElement('div');
            line.className = 'log-line';
            
            let formatted = msg;
            formatted = formatted.replace(/IP: ([^ |]+)/, 'IP: <span style="color:#56b6c2;font-weight:bold">$1</span>');
            if (formatted.includes('[SAVED]')) formatted = `<span style="color:#98c379">${formatted}</span>`;
            if (formatted.includes('[ERROR]') || formatted.includes('[FATAL]')) formatted = `<span style="color:#e06c75;font-weight:bold">${formatted}</span>`;
            if (formatted.includes('[HEALTH]')) formatted = `<span style="color:#e5c07b">${formatted}</span>`;

            line.innerHTML = `<span style="color:#888;margin-right:10px">[${new Date().toLocaleTimeString()}]</span> ${formatted}`;
            logDiv.prepend(line);
            if (logDiv.childNodes.length > 50) logDiv.removeChild(logDiv.lastChild);
        }

        function addQaItem(path) {
            const id = btoa(unescape(encodeURIComponent(path))).replace(/[^a-zA-Z0-9]/g, '');
            if (document.getElementById(id)) return;
            const item = document.createElement('div');
            item.id = id;
            item.className = 'qa-item';
            let realUrl = 'https://' + path.replace('/index.html', '');
            item.innerHTML = `
                <div class="text-truncate mb-2" title="${path}">${path}</div>
                <div class="btn-group btn-group-sm w-100">
                    <a href="/mirror/${path}" target="_blank" class="btn btn-outline-dark">Mirror</a>
                    <a href="${realUrl}" target="_blank" class="btn btn-outline-secondary">Live</a>
                </div>
            `;
            qaList.prepend(item);
        }

        socket.on('update', (data) => {
            if (data.config) {
                document.getElementById('count').innerText = data.config.downloadedCount;
                document.getElementById('jitter').innerText = data.config.currentJitter;
                document.getElementById('parallel').innerText = data.config.maxConcurrency;
            }
            if (data.msg) {
                addLog(data.msg);
                if (data.msg.includes('[SAVED]')) addQaItem(data.msg.split('Path: ')[1].trim());
            }
        });

        // Load existing mirrored pages on startup
        async function loadInitialData() {
            try {
                const response = await fetch('/qa/list');
                const files = await response.json();
                files.forEach(f => addQaItem(f.path));
            } catch (e) {
                addLog("Error loading mirror list: " + e.message);
            }
        }
        loadInitialData();
    </script>
</body>
</html>
